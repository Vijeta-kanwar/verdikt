services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: verdikt
      POSTGRES_USER: verdikt
      POSTGRES_PASSWORD: verdikt_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verdikt"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: verdikt
      RABBITMQ_DEFAULT_PASS: verdikt_dev

volumes:
  pgdata: